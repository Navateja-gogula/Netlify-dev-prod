name: CI/CD for React App

on:
  push:
    branches:
      - dev
      - prod

jobs:
  build-and-deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build the app for dev with homepage
      - name: Build the app (Dev)
        run: |
          REACT_APP_HOMEPAGE=https://devv-site.netlify.app npm run build

      # Deploy to Netlify (Dev)
      - name: Deploy to Netlify (Dev)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./build
          production-deploy: false
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

  auto-merge-to-prod:
    needs: build-and-deploy-dev
    if: success() && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure Git
      - name: Set up Git
        run: |
          git config --global user.name "Navateja-gogula"
          git config --global user.email "ngogula@anergroup.com"

      # Merge dev into prod and resolve conflicts (Favor prod changes)
      - name: Merge dev into prod and resolve conflicts
        run: |
          git fetch origin
          git checkout prod
          git merge dev --strategy-option ours --allow-unrelated-histories --no-edit
          git push origin prod || echo "Merge conflicts resolved, no changes to push"

  build-and-deploy-prod:
    needs: auto-merge-to-prod
    if: success() && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build the app for prod with homepage
      - name: Build the app (Prod)
        run: |
          REACT_APP_HOMEPAGE=https://prod-site.netlify.app npm run build

      # Deploy to Netlify (Prod)
      - name: Deploy to Netlify (Prod)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./build
          production-deploy: true
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}
