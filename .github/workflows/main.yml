name: Multi-Environment Deployment with Notifications

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-and-deploy-dev:
    if: github.ref_name == 'dev'  # Only runs on dev branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build the app
        run: npm run build --verbose

      - name: Deploy to Netlify (dev)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./build
          production-deploy: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

      - name: Send email for dev deploy
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Code Deployed to Dev Environment"
          body: |
            The latest code has been successfully deployed to the dev environment.
            Visit the site at ${{ secrets.HOMEPAGE_URL }}.
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.run_id }}
          to: "gogulateja92@gmail.com"
          from: "gogulanavateja1910@gmail.com"

  deploy-to-netlify-prod:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    name: Deploy to Netlify (Prod)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build --verbose

      - name: Deploy to Netlify (Prod)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./build
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}

      - name: Send email for prod deploy
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Code Deployed to Prod Environment"
          body: |
            The latest code has been successfully deployed to the prod environment.
            Visit the site at ${{ secrets.PROD_HOMEPAGE_URL }}.
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.run_id }}
          to: "gogulateja92@gmail.com"
          from: "gogulanavateja1910@gmail.com"
